
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: garrison
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d garrison"]
      interval: 5s 
      timeout: 5s 
      retries: 5

  api:
    build: .
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/app/certs
    depends_on:
      db:
        condition: service_healthy
    environment:
      MTLS_ENABLED: true
      DATABASE_URL: postgres://user:password@db:5432/garrison?sslmode=disable

volumes:
  pgdata:
