
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: garrison
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d garrison"]
      interval: 5s 
      timeout: 5s 
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      environment:
        DATABASE_URL: postgres://user:password@db:5432/garrison?sslmode=disable

volumes:
  pgdata:
